name: Update Market Data

on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-market-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s\n" "${{ secrets.MARKET_SSH_KEY }}" > ~/.ssh/market_pull_key
          chmod 600 ~/.ssh/market_pull_key
          ssh-keyscan -H "${{ secrets.MARKET_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Import public market data
        env:
          MARKET_CLOUD_SOURCE: ${{ secrets.MARKET_SSH_USER }}@${{ secrets.MARKET_SSH_HOST }}:/home/scraper/data/market/
          RSYNC_RSH: ssh -i ~/.ssh/market_pull_key -o IdentitiesOnly=yes
        run: python3 tools/import_public_market_data.py

      - name: Validate public JSON
        run: |
          python3 -m json.tool site/public/data/latest.json >/dev/null
          python3 -m json.tool site/public/data/index.json >/dev/null

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - name: Commit public data changes
        id: commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/public/data/latest.json site/public/data/index.json site/public/data/snapshots/recent/*.json
          if git diff --cached --quiet -- site/public/data; then
            echo "No market data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Update market data"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

  deploy:
    needs: update
    if: needs.update.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
